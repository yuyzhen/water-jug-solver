<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>148升倒水挑战</title>
  <style>
    :root {
      --ink: #f8fbff;
      --muted: rgba(248, 251, 255, .72);
      --line: rgba(150, 219, 255, .42);
      --cyan: #3cd7ff;
      --gold: #ffd34f;
      --rose: #ff6d98;
      --water: #21c9ff;
      --deep: #081031;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 26% 12%, rgba(92, 63, 187, .46), transparent 34%),
        radial-gradient(circle at 76% 30%, rgba(33, 198, 255, .18), transparent 31%),
        radial-gradient(ellipse at 50% 100%, rgba(6, 198, 255, .13), transparent 36%),
        linear-gradient(180deg, #241163 0%, #17104c 48%, #06102f 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .48;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.56) 0 1px, transparent 2px),
        radial-gradient(circle, rgba(61,215,255,.7) 0 1px, transparent 2px);
      background-size: 92px 108px, 143px 121px;
      background-position: 14px 24px, 58px 71px;
      mask-image: linear-gradient(180deg, #000 0 68%, transparent);
    }

    .game {
      position: relative;
      width: min(100vw, 980px);
      height: 100vh;
      min-height: 680px;
      margin: 0 auto;
      padding: 22px clamp(16px, 4vw, 44px) 28px;
      display: grid;
      grid-template-rows: auto minmax(150px, 24vh) 1fr auto;
      gap: 12px;
    }

    .game::after {
      content: "";
      position: absolute;
      left: clamp(18px, 6vw, 70px);
      right: clamp(18px, 6vw, 70px);
      bottom: 82px;
      height: 150px;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 50% 50%, rgba(58, 223, 255, .18), transparent 56%),
        radial-gradient(ellipse at 50% 82%, rgba(1, 7, 28, .48), transparent 58%);
      pointer-events: none;
      z-index: 0;
      filter: blur(.2px);
    }

    header {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4.5vw, 46px);
      line-height: 1;
      color: #fff7b8;
      text-shadow: 0 5px 0 rgba(0,0,0,.22), 0 0 24px rgba(255, 211, 79, .35);
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: clamp(13px, 1.8vw, 16px);
      line-height: 1.55;
      max-width: 620px;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      appearance: none;
      border: 1px solid rgba(255,255,255,.22);
      color: white;
      background: linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.07));
      border-radius: 8px;
      padding: 9px 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 12px 25px rgba(0,0,0,.16);
    }

    button:hover { background: rgba(255,255,255,.16); }
    button:disabled {
      cursor: default;
      opacity: .46;
      filter: saturate(.7);
    }

    .lake {
      position: relative;
      align-self: stretch;
      border: 1px solid rgba(120, 232, 255, .38);
      border-radius: 18px 18px 46% 46% / 14px 14px 38% 38%;
      overflow: hidden;
      cursor: pointer;
      box-shadow:
        inset 0 24px 26px rgba(255,255,255,.14),
        inset 0 -28px 58px rgba(2, 24, 83, .72),
        0 24px 48px rgba(0,0,0,.2),
        0 0 42px rgba(23, 188, 255, .13);
      background:
        radial-gradient(ellipse at 23% 8%, rgba(255,255,255,.42), transparent 15%),
        radial-gradient(ellipse at 76% 34%, rgba(137,235,255,.28), transparent 16%),
        radial-gradient(ellipse at 50% 110%, rgba(255,255,255,.36), transparent 18%),
        linear-gradient(180deg, rgba(71, 215, 255, .82), rgba(14, 119, 202, .83) 52%, rgba(4, 31, 91, .96));
    }

    .lake::before,
    .lake::after {
      content: "";
      position: absolute;
      left: -10%;
      right: -10%;
      height: 46px;
      border-radius: 50%;
      background:
        linear-gradient(90deg, transparent, rgba(255,255,255,.33), transparent),
        rgba(185, 242, 255, .18);
      animation: wave 4.8s ease-in-out infinite;
    }

    .lake::before { top: 24px; }
    .lake::after { top: 62px; opacity: .28; animation-delay: -1.7s; }

    .lake-label {
      position: absolute;
      left: 24px;
      bottom: 18px;
      color: rgba(255,255,255,.82);
      font-weight: 800;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(4, 18, 61, .22);
      border: 1px solid rgba(198, 247, 255, .18);
      text-shadow: 0 2px 12px rgba(0,0,0,.36);
    }

    .bottle-row {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(3, minmax(105px, 1fr));
      align-items: end;
      justify-items: center;
      gap: clamp(14px, 4vw, 46px);
      padding: 24px 0 10px;
    }

    .bucket {
      --level: 0%;
      --fill: #28caff;
      --bucket-scale: 1;
      --bottle-width: 180px;
      --bottle-height: 360px;
      position: relative;
      width: clamp(112px, 21vw, 205px);
      height: clamp(300px, 48vh, 444px);
      border: 0;
      background: transparent;
      padding: 0;
      transform: translateY(0);
      transition: transform .24s ease, filter .24s ease;
      cursor: pointer;
      outline: none;
      box-shadow: none;
    }

    .bucket:hover,
    .bucket:focus,
    .bucket:active {
      background: transparent;
      box-shadow: none;
    }

    .bucket:hover { filter: brightness(1.09); }
    .bucket::after {
      content: "";
      position: absolute;
      left: 18%;
      right: 18%;
      bottom: -13px;
      height: 22px;
      border-radius: 50%;
      background: radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, .48), transparent 67%);
      z-index: -1;
      pointer-events: none;
      transition: transform .24s ease, opacity .24s ease;
    }

    .bucket.selected {
      transform: translateY(-22px);
      filter: none;
    }
    .bucket.selected::after { transform: translateY(22px) scale(.88); opacity: .38; }
    .bucket.tilting-left .bottle-wrap { animation: tiltLeft 1.45s cubic-bezier(.18, .82, .24, 1) forwards; }
    .bucket.tilting-right .bottle-wrap { animation: tiltRight 1.45s cubic-bezier(.18, .82, .24, 1) forwards; }
    .bucket.tilting-left .liquid-layer { animation: pourSloshLeft 1.45s ease-in-out; }
    .bucket.tilting-right .liquid-layer { animation: pourSloshRight 1.45s ease-in-out; }
    .bucket.receiving .liquid-layer { animation: slosh 1.05s ease-in-out; }
    .bucket.receiving .bottle-svg { filter: drop-shadow(0 18px 22px rgba(0,0,0,.34)) drop-shadow(0 0 18px rgba(142, 234, 255, .28)); }

    .bottle-wrap {
      position: absolute;
      left: 50%;
      bottom: 34px;
      width: var(--bottle-width);
      height: var(--bottle-height);
      transform: translateX(-50%);
      transform-origin: 50% 17%;
    }

    .bottle-svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
      filter: drop-shadow(0 18px 22px rgba(0,0,0,.34));
      pointer-events: none;
    }

    .liquid-layer {
      transform-origin: 120px 302px;
      filter: saturate(1.12);
    }

    .liquid-fill,
    .liquid-surface {
      transition: y .72s cubic-bezier(.19, 1, .22, 1),
        height .72s cubic-bezier(.19, 1, .22, 1),
        cy .72s cubic-bezier(.19, 1, .22, 1),
        rx .72s cubic-bezier(.19, 1, .22, 1);
    }

    .bucket.tilting-left .liquid-fill,
    .bucket.tilting-left .liquid-surface,
    .bucket.tilting-right .liquid-fill,
    .bucket.tilting-right .liquid-surface,
    .bucket.receiving .liquid-fill,
    .bucket.receiving .liquid-surface {
      transition-delay: .24s;
      transition-duration: .86s;
    }

    .bucket-info {
      position: absolute;
      left: 0;
      right: 0;
      bottom: -18px;
      display: grid;
      place-items: center;
      gap: 2px;
      pointer-events: none;
      text-shadow: 0 3px 8px rgba(0,0,0,.75);
    }

    .amount {
      font-size: clamp(22px, 3.4vw, 34px);
      font-weight: 900;
      color: #fff;
    }

    .capacity {
      color: rgba(255,255,255,.78);
      font-size: 13px;
      font-weight: 700;
    }

    .pour-svg {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      overflow: visible;
    }

    .pour-path {
      fill: none;
      stroke: url(#pourGradient);
      stroke-width: 13;
      stroke-linecap: round;
      stroke-dasharray: var(--path-len);
      stroke-dashoffset: var(--path-len);
      filter: drop-shadow(0 0 12px rgba(57, 218, 255, .92));
      animation: streamDraw 1.36s ease-in-out forwards;
    }

    .pour-path.thin {
      stroke-width: 5;
      opacity: .58;
      animation-delay: .08s;
    }

    .pour-drop {
      fill: rgba(196, 246, 255, .95);
      filter: drop-shadow(0 0 8px rgba(57, 218, 255, .75));
      offset-path: path(var(--drop-path));
      offset-distance: 0%;
      animation: dropTravel 1.02s var(--delay) ease-in forwards;
    }

    .splash {
      position: fixed;
      z-index: 11;
      left: var(--x);
      top: var(--y);
      width: 10px;
      height: 10px;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }

    .splash::before {
      content: "";
      position: absolute;
      inset: -13px;
      border: 3px solid rgba(183, 242, 255, .75);
      border-radius: 50%;
      transform: scale(.2);
      animation: splashRing .7s ease-out forwards;
    }

    .splash span {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, white, rgba(112, 231, 255, .92));
      transform: rotate(var(--a)) translateY(0);
      animation: splashDrop .72s ease-out forwards;
    }

    .status {
      --progress: 0%;
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,.16);
      color: rgba(255,255,255,.86);
    }

    .total {
      font-size: clamp(22px, 4vw, 40px);
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 4px 0 rgba(0,0,0,.22);
    }

    .message {
      min-height: 24px;
      color: var(--muted);
      font-weight: 700;
    }

    .target-meter {
      margin-top: 9px;
      width: min(390px, 100%);
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,.12);
      box-shadow: inset 0 1px 3px rgba(0,0,0,.28);
    }

    .target-meter span {
      display: block;
      width: var(--progress);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #36d7ff, #ffe86a 82%, #ffffff);
      box-shadow: 0 0 18px rgba(255, 211, 79, .28);
      transition: width .72s cubic-bezier(.19, 1, .22, 1);
    }

    .win {
      color: #fff1a8;
      text-shadow: 0 0 18px rgba(255, 211, 79, .55);
    }

    .win-modal {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(3, 8, 31, .42);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
      backdrop-filter: blur(4px);
    }

    .win-modal.open {
      opacity: 1;
      pointer-events: auto;
    }

    .win-panel {
      width: min(420px, 92vw);
      border: 1px solid rgba(255, 238, 157, .46);
      border-radius: 8px;
      padding: 28px 26px 24px;
      text-align: center;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 224, 96, .22), transparent 42%),
        linear-gradient(180deg, rgba(30, 25, 86, .96), rgba(8, 16, 55, .96));
      box-shadow: 0 30px 80px rgba(0,0,0,.42), 0 0 46px rgba(255, 211, 79, .18);
      transform: translateY(12px) scale(.96);
      transition: transform .25s ease;
    }

    .win-modal.open .win-panel {
      transform: translateY(0) scale(1);
    }

    .win-kicker {
      color: #8feaff;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0;
      margin-bottom: 8px;
    }

    .win-panel h2 {
      margin: 0;
      color: #fff3a6;
      font-size: clamp(30px, 5vw, 46px);
      line-height: 1;
      text-shadow: 0 4px 0 rgba(0,0,0,.26), 0 0 24px rgba(255, 211, 79, .35);
    }

    .win-panel p {
      margin: 14px 0 20px;
      color: rgba(255,255,255,.78);
      line-height: 1.6;
    }

    .fireworks {
      position: fixed;
      inset: 0;
      z-index: 24;
      pointer-events: none;
      overflow: hidden;
    }

    .firework {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: 8px;
      height: 8px;
      transform: translate(-50%, -50%);
    }

    .firework i {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 5px;
      height: 14px;
      border-radius: 999px;
      background: var(--c);
      box-shadow: 0 0 12px var(--c);
      transform: translate(-50%, -50%) rotate(var(--a));
      animation: firework .98s cubic-bezier(.08, .76, .22, 1) forwards;
      animation-delay: var(--delay);
    }

    @keyframes wave {
      0%, 100% { transform: translateX(-3%) scaleX(1.06) translateY(0); }
      50% { transform: translateX(4%) scaleX(.98) translateY(5px); }
    }

    @keyframes bob {
      0%, 100% { transform: translateX(-4%); }
      50% { transform: translateX(5%); }
    }

    @keyframes slosh {
      0%, 100% { transform: translateX(0) skewX(0deg); }
      24% { transform: translateX(-7%) skewX(-8deg); }
      52% { transform: translateX(6%) skewX(7deg); }
      78% { transform: translateX(-3%) skewX(-4deg); }
    }

    @keyframes firework {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--a)) translateY(0) scale(.25);
      }
      14% { opacity: 1; }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--a)) translateY(var(--r)) scale(.95);
      }
    }

    @keyframes pourSloshLeft {
      0%, 100% { transform: translateX(0) skewX(0deg); }
      30%, 72% { transform: translateX(-7px) skewX(-12deg); }
    }

    @keyframes pourSloshRight {
      0%, 100% { transform: translateX(0) skewX(0deg); }
      30%, 72% { transform: translateX(7px) skewX(12deg); }
    }

    @keyframes tiltLeft {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      28%, 72% { transform: translateX(-50%) rotate(-52deg); }
    }

    @keyframes tiltRight {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      28%, 72% { transform: translateX(-50%) rotate(52deg); }
    }

    @keyframes streamDraw {
      0% { stroke-dashoffset: var(--path-len); opacity: 0; }
      16% { opacity: 1; }
      36%, 78% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: calc(var(--path-len) * -1); opacity: 0; }
    }

    @keyframes dropTravel {
      0% { offset-distance: 0%; opacity: 0; transform: scale(.65); }
      18%, 78% { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; transform: scale(1.05); }
    }

    @keyframes splashRing {
      0% { opacity: 0; transform: scale(.2); }
      35% { opacity: .95; }
      100% { opacity: 0; transform: scale(1.45); }
    }

    @keyframes splashDrop {
      0% { opacity: .95; transform: rotate(var(--a)) translateY(0) scale(.7); }
      100% { opacity: 0; transform: rotate(var(--a)) translateY(var(--d)) scale(.35); }
    }

    @media (max-width: 680px) {
      body { overflow-y: auto; }
      .game {
        min-height: 760px;
        height: auto;
        grid-template-rows: auto 150px 420px auto;
      }
      header {
        flex-direction: column;
        align-items: stretch;
      }
      .controls { justify-content: flex-start; }
      .bottle-row {
        display: block;
        height: 420px;
        overflow: hidden;
      }
      .bucket {
        position: absolute;
        width: 112px;
        height: 318px;
      }
      .bucket:nth-child(1) { left: 18px; }
      .bucket:nth-child(2) { left: 136px; }
      .bucket:nth-child(3) { left: 254px; }
      .bottle-wrap {
        bottom: 54px;
      }
      .status { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="game" aria-label="148升倒水挑战">
    <header>
      <div>
        <h1>148升倒水挑战</h1>
        <p class="subtitle">用 38L、39L、75L 三个无刻度水桶，从湖里精确留下 148L 水。</p>
      </div>
      <div class="controls">
        <button id="dumpBtn" type="button" disabled>倒回湖里</button>
        <button id="undoBtn" type="button">撤销</button>
        <button id="hintBtn" type="button">提示</button>
        <button id="resetBtn" type="button">重来</button>
      </div>
    </header>

    <section id="lake" class="lake" role="button" tabindex="0" aria-label="湖水">
      <div class="lake-label">湖水</div>
    </section>

    <section id="bottleRow" class="bottle-row" aria-label="三个水桶"></section>

    <section class="status">
      <div>
        <div class="message" id="message">点击水桶选中；点湖水装满，点其他水桶倒入，点“倒回湖里”清空选中的水桶。</div>
        <div class="target-meter" aria-hidden="true"><span></span></div>
        <div id="steps">步数：0</div>
      </div>
      <div class="total" id="total">0 / 148L</div>
    </section>

    <section id="winModal" class="win-modal" aria-live="polite" aria-hidden="true">
      <div class="win-panel">
        <div class="win-kicker">挑战完成</div>
        <h2>精确取得 148L</h2>
        <p id="winText">三个水桶里的水量合计正好 148L。</p>
        <button id="playAgainBtn" type="button">再玩一次</button>
      </div>
    </section>
  </main>

  <script>
    const capacities = [38, 39, 75];
    const colors = ["#58d42f", "#ff8f22", "#24c7ff"];
    const target = 148;
    const state = {
      amounts: [0, 0, 0],
      selected: null,
      steps: 0,
      history: [],
      won: false,
      isAnimating: false,
      animationTimers: []
    };
    const liquidUpdateDelay = 360;
    const pourAnimationDuration = 1560;

    const row = document.getElementById("bottleRow");
    const lake = document.getElementById("lake");
    const totalEl = document.getElementById("total");
    const messageEl = document.getElementById("message");
    const stepsEl = document.getElementById("steps");
    const dumpBtn = document.getElementById("dumpBtn");
    const hintBtn = document.getElementById("hintBtn");
    const winModal = document.getElementById("winModal");
    const winText = document.getElementById("winText");
    const playAgainBtn = document.getElementById("playAgainBtn");
    const solutionHints = [
      "推荐路径 1/9：装满 75L 桶。",
      "推荐路径 2/9：75L 桶倒入 38L 桶，75L 桶剩 37L。",
      "推荐路径 3/9：把 38L 桶倒回湖里。",
      "推荐路径 4/9：75L 桶剩下的 37L 倒入 38L 桶。",
      "推荐路径 5/9：再次装满 75L 桶。",
      "推荐路径 6/9：75L 桶倒入 39L 桶，75L 桶剩 36L。",
      "推荐路径 7/9：把 39L 桶倒回湖里。",
      "推荐路径 8/9：75L 桶剩下的 36L 倒入 39L 桶。",
      "推荐路径 9/9：最后装满 75L 桶，总量为 37 + 36 + 75 = 148L。"
    ];
    let hintIndex = 0;
    let hintUnlocked = false;

    const bucketEls = capacities.map((capacity, index) => {
      const button = document.createElement("button");
      button.className = "bucket";
      button.type = "button";
      button.dataset.index = index;
      button.style.setProperty("--fill", colors[index]);
      setBottleSize(button, capacity);
      button.innerHTML = `
        <div class="bottle-wrap">
          ${bottleSvg(index)}
        </div>
        <div class="bucket-info">
          <div class="amount">0L</div>
          <div class="capacity">${capacity}L 桶</div>
        </div>
      `;
      button.addEventListener("click", () => handleBucket(index));
      row.appendChild(button);
      return button;
    });

    window.addEventListener("resize", () => {
      bucketEls.forEach((button, index) => setBottleSize(button, capacities[index]));
    });

    function setBottleSize(button, capacity) {
      const isMobile = window.matchMedia("(max-width: 680px)").matches;
      const scale = Math.sqrt(capacity / Math.max(...capacities));
      const baseWidth = isMobile ? 112 : 205;
      const baseHeight = isMobile ? 224 : 410;
      button.style.setProperty("--bucket-scale", String(scale));
      button.style.setProperty("--bottle-width", `${Math.round(baseWidth * scale)}px`);
      button.style.setProperty("--bottle-height", `${Math.round(baseHeight * scale)}px`);
    }

    function bottleSvg(index) {
      const clipId = `bottleClip${index}`;
      const glassId = `glassGradient${index}`;
      const bodyId = `bodyGradient${index}`;
      const rimId = `rimGradient${index}`;
      const liquidId = `liquidGradient${index}`;
      const shineId = `shineGradient${index}`;
      const glowId = `glassGlow${index}`;
      return `
        <svg class="bottle-svg" viewBox="0 0 240 360" aria-hidden="true">
          <defs>
            <filter id="${glowId}" x="-35%" y="-35%" width="170%" height="170%">
              <feGaussianBlur stdDeviation="2.3" result="blur"/>
              <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.15 0 0 0 0 0.72 0 0 0 0 1 0 0 0 .75 0"/>
              <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
            <linearGradient id="${glassId}" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#39bfff" stop-opacity=".88"/>
              <stop offset="10%" stop-color="#0e5bb9" stop-opacity=".92"/>
              <stop offset="31%" stop-color="#c8f7ff" stop-opacity=".16"/>
              <stop offset="54%" stop-color="#061239" stop-opacity=".36"/>
              <stop offset="76%" stop-color="#e5fdff" stop-opacity=".34"/>
              <stop offset="91%" stop-color="#1388e8" stop-opacity=".92"/>
              <stop offset="100%" stop-color="#04317f" stop-opacity=".96"/>
            </linearGradient>
            <radialGradient id="${bodyId}" cx="50%" cy="38%" r="70%">
              <stop offset="0%" stop-color="#ffffff" stop-opacity=".11"/>
              <stop offset="38%" stop-color="#183b87" stop-opacity=".11"/>
              <stop offset="74%" stop-color="#020929" stop-opacity=".3"/>
              <stop offset="100%" stop-color="#02061b" stop-opacity=".55"/>
            </radialGradient>
            <linearGradient id="${rimId}" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#e9fdff"/>
              <stop offset="28%" stop-color="#6bdfff"/>
              <stop offset="58%" stop-color="#116cc5"/>
              <stop offset="100%" stop-color="#02164e"/>
            </linearGradient>
            <linearGradient id="${liquidId}" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="color-mix(in srgb, var(--fill), white 38%)"/>
              <stop offset="52%" stop-color="var(--fill)"/>
              <stop offset="100%" stop-color="color-mix(in srgb, var(--fill), black 22%)"/>
            </linearGradient>
            <linearGradient id="${shineId}" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="white" stop-opacity="0"/>
              <stop offset="55%" stop-color="white" stop-opacity=".05"/>
              <stop offset="72%" stop-color="white" stop-opacity=".42"/>
              <stop offset="82%" stop-color="white" stop-opacity=".18"/>
              <stop offset="100%" stop-color="white" stop-opacity="0"/>
            </linearGradient>
            <clipPath id="${clipId}">
              <path d="M58 140 C58 121 72 108 96 103 L100 87 L140 87 L144 103 C168 108 182 121 182 140 L182 281 C182 300 168 311 143 312 L97 312 C72 311 58 300 58 281 Z"/>
            </clipPath>
          </defs>

          <ellipse cx="120" cy="329" rx="82" ry="15" fill="#000a2f" opacity=".68"/>
          <ellipse cx="120" cy="323" rx="70" ry="11" fill="#1dd5ff" opacity=".16"/>

          <rect x="96" y="51" width="48" height="48" rx="9" fill="url(#${glassId})" opacity=".84"/>
          <path d="M98 56 L98 101 M142 56 L142 101" stroke="#7deaff" stroke-width="5" stroke-opacity=".22"/>
          <ellipse cx="120" cy="50" rx="23" ry="6" fill="#071846" stroke="#75e8ff" stroke-width="3" opacity=".9"/>
          <ellipse cx="120" cy="48.6" rx="15" ry="2.4" fill="#d9fdff" opacity=".26"/>
          <ellipse cx="120" cy="76" rx="36" ry="19" fill="url(#${glassId})" opacity=".82"/>
          <ellipse cx="120" cy="74" rx="24" ry="8.5" fill="#071846" opacity=".74"/>

          <g class="liquid-layer" clip-path="url(#${clipId})">
            <rect class="liquid-fill" x="58" y="302" width="124" height="0" rx="18" fill="url(#${liquidId})"/>
            <ellipse class="liquid-surface" cx="120" cy="306" rx="58" ry="9" fill="#d7fcff" opacity=".18"/>
            <circle cx="89" cy="218" r="3.5" fill="#ffffff" opacity=".16"/>
            <circle cx="152" cy="254" r="4.3" fill="#ffffff" opacity=".2"/>
            <circle cx="142" cy="189" r="2.8" fill="#ffffff" opacity=".12"/>
          </g>

          <path d="M46 137 C46 112 66 96 92 90 L96 72 L144 72 L148 90 C174 96 194 112 194 137 L194 286 C194 314 176 326 145 326 L95 326 C64 326 46 314 46 286 Z"
            fill="url(#${bodyId})" stroke="url(#${glassId})" stroke-width="9" stroke-linejoin="round" filter="url(#${glowId})"/>
          <path d="M58 140 C58 121 72 108 96 103 L100 87 L140 87 L144 103 C168 108 182 121 182 140 L182 281 C182 300 168 311 143 312 L97 312 C72 311 58 300 58 281 Z"
            fill="none" stroke="#d8fbff" stroke-opacity=".35" stroke-width="3"/>
          <path d="M63 306 C88 319 152 319 177 306" fill="none" stroke="#021a68" stroke-width="14" stroke-linecap="round" opacity=".72"/>
          <path d="M70 301 C96 310 144 310 170 301" fill="none" stroke="#baf7ff" stroke-width="5" stroke-linecap="round" opacity=".45"/>
          <path d="M151 111 C181 136 181 263 160 300" fill="none" stroke="url(#${shineId})" stroke-width="28" stroke-linecap="round" opacity=".9"/>
          <path d="M73 137 C65 181 65 247 74 292" fill="none" stroke="#78eaff" stroke-width="5" stroke-linecap="round" opacity=".5"/>
          <path d="M181 139 C190 190 190 249 181 292" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".22"/>
          <path d="M68 130 C78 104 98 98 111 96" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity=".12"/>
        </svg>
      `;
    }

    lake.addEventListener("click", fillFromLake);
    lake.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        fillFromLake();
      }
    });

    dumpBtn.addEventListener("click", dumpToLake);
    hintBtn.addEventListener("click", () => {
      if (!hintUnlocked) {
        const password = window.prompt("请输入提示密码");
        if (password !== "148") {
          setMessage("密码不对，暂时不能查看提示。");
          return;
        }
        hintUnlocked = true;
      }
      setMessage(solutionHints[hintIndex]);
      hintIndex = (hintIndex + 1) % solutionHints.length;
    });
    playAgainBtn.addEventListener("click", resetGame);

    document.getElementById("resetBtn").addEventListener("click", resetGame);

    function resetGame() {
      clearAnimationTimers();
      cleanupBottleMotion();
      state.amounts = [0, 0, 0];
      state.selected = null;
      state.steps = 0;
      state.history = [];
      state.won = false;
      state.isAnimating = false;
      hintIndex = 0;
      hideWin();
      setMessage("湖水已经归零，重新开始。");
      render();
    }

    document.getElementById("undoBtn").addEventListener("click", () => {
      if (state.isAnimating) {
        setMessage("等这次倒水结束后再撤销。");
        return;
      }
      const last = state.history.pop();
      if (!last) {
        setMessage("还没有可撤销的倒水步骤。");
        return;
      }
      state.amounts = last.amounts;
      state.selected = last.selected;
      state.steps = last.steps;
      state.won = false;
      hideWin();
      setMessage("已撤销上一步。");
      render();
    });

    function handleBucket(index) {
      if (state.isAnimating) {
        setMessage("水还在流，稍等一下。");
        return;
      }
      if (state.selected === null) {
        state.selected = index;
        setMessage(`${capacities[index]}L 桶已选中。`);
        render();
        return;
      }

      if (state.selected === index) {
        state.selected = null;
        setMessage("取消选中。");
        render();
        return;
      }

      pourToBucket(state.selected, index);
    }

    function dumpToLake() {
      if (state.isAnimating) {
        setMessage("水还在流，稍等一下。");
        return;
      }
      const index = state.selected;
      if (index === null) {
        setMessage("先选中一个要倒回湖里的水桶。");
        return;
      }
      if (state.amounts[index] === 0) {
        setMessage("选中的水桶是空的。");
        return;
      }

      saveHistory();
      const poured = state.amounts[index];
      const nextAmounts = [...state.amounts];
      nextAmounts[index] = 0;
      animatePour(index, "lake");
      setMessage(`${capacities[index]}L 桶倒回湖里 ${poured}L。`);
      state.selected = null;
      scheduleLiquidUpdate(() => {
        state.amounts = nextAmounts;
        state.steps += 1;
      });
    }

    function fillFromLake() {
      if (state.isAnimating) {
        setMessage("水还在流，稍等一下。");
        return;
      }
      const index = state.selected;
      if (index === null) {
        setMessage("先选中一个水桶。");
        return;
      }
      const need = capacities[index] - state.amounts[index];
      if (need === 0) {
        setMessage("这个水桶已经满了。");
        return;
      }
      saveHistory();
      const nextAmounts = [...state.amounts];
      nextAmounts[index] = capacities[index];
      animateLakeFill(index);
      setMessage(`从湖里装满 ${capacities[index]}L 桶，加入 ${need}L。`);
      state.selected = null;
      scheduleLiquidUpdate(() => {
        state.amounts = nextAmounts;
        state.steps += 1;
      });
    }

    function pourToBucket(from, to) {
      const available = state.amounts[from];
      const space = capacities[to] - state.amounts[to];
      if (available === 0) {
        setMessage("选中的水桶是空的。");
        state.selected = to;
        render();
        return;
      }
      if (space === 0) {
        setMessage("目标水桶已经满了。");
        state.selected = to;
        render();
        return;
      }

      saveHistory();
      const moved = Math.min(available, space);
      const nextAmounts = [...state.amounts];
      nextAmounts[from] -= moved;
      nextAmounts[to] += moved;
      animatePour(from, to);
      setMessage(`${capacities[from]}L 桶向 ${capacities[to]}L 桶倒入 ${moved}L。`);
      state.selected = null;
      scheduleLiquidUpdate(() => {
        state.amounts = nextAmounts;
        state.steps += 1;
      });
    }

    function saveHistory() {
      state.history.push({
        amounts: [...state.amounts],
        selected: state.selected,
        steps: state.steps
      });
      if (state.history.length > 80) state.history.shift();
    }

    function renderSoon() {
      render();
      window.setTimeout(checkWin, 1560);
    }

    function scheduleLiquidUpdate(applyUpdate) {
      state.isAnimating = true;
      dumpBtn.disabled = true;
      render();
      const updateTimer = window.setTimeout(() => {
        applyUpdate();
        render();
      }, liquidUpdateDelay);
      const endTimer = window.setTimeout(() => {
        cleanupBottleMotion();
        state.isAnimating = false;
        state.animationTimers = [];
        render();
        checkWin();
      }, pourAnimationDuration);
      state.animationTimers.push(updateTimer, endTimer);
    }

    function clearAnimationTimers() {
      state.animationTimers.forEach((timer) => window.clearTimeout(timer));
      state.animationTimers = [];
    }

    function cleanupBottleMotion() {
      bucketEls.forEach((el) => {
        el.classList.remove("tilting-left", "tilting-right", "receiving");
      });
    }

    function render() {
      bucketEls.forEach((el, index) => {
        const amount = state.amounts[index];
        const ratio = amount / capacities[index];
        const liquidBottom = 302;
        const liquidHeight = ratio * 198;
        const liquidY = liquidBottom - liquidHeight;
        const surfaceY = amount === 0 ? 306 : liquidY;
        const surfaceRadius = ratio > .82 ? 42 : 58;
        el.style.setProperty("--level", `${ratio * 100}%`);
        el.classList.toggle("selected", state.selected === index);
        const fill = el.querySelector(".liquid-fill");
        const surface = el.querySelector(".liquid-surface");
        fill.setAttribute("y", liquidY.toFixed(2));
        fill.setAttribute("height", liquidHeight.toFixed(2));
        surface.setAttribute("cy", surfaceY.toFixed(2));
        surface.setAttribute("rx", String(surfaceRadius));
        surface.setAttribute("opacity", amount === 0 ? ".18" : ".78");
        el.querySelector(".amount").textContent = `${amount}L`;
        el.setAttribute("aria-label", `${capacities[index]}升水桶，当前${amount}升`);
      });
      const total = state.amounts.reduce((sum, value) => sum + value, 0);
      totalEl.textContent = `${total} / ${target}L`;
      totalEl.classList.toggle("win", total === target);
      document.querySelector(".status").style.setProperty("--progress", `${Math.min(total / target, 1) * 100}%`);
      stepsEl.textContent = `步数：${state.steps}`;
      dumpBtn.disabled = state.selected === null || state.amounts[state.selected] === 0;
    }

    function setMessage(text) {
      messageEl.textContent = text;
    }

    function checkWin() {
      const total = state.amounts.reduce((sum, value) => sum + value, 0);
      if (total === target && !state.won) {
        state.won = true;
        setMessage(`完成：三个水桶中一共精确留下 ${target}L。`);
        showWin();
      }
    }

    function showWin() {
      winText.textContent = `你用了 ${state.steps} 步完成挑战，三个水桶里的水量合计正好 ${target}L。`;
      winModal.classList.add("open");
      winModal.setAttribute("aria-hidden", "false");
      launchFireworks();
    }

    function hideWin() {
      winModal.classList.remove("open");
      winModal.setAttribute("aria-hidden", "true");
    }

    function launchFireworks() {
      document.querySelectorAll(".fireworks").forEach((node) => node.remove());
      const layer = document.createElement("div");
      layer.className = "fireworks";
      const palette = ["#ffd34f", "#8feaff", "#ff6d98", "#9cff55", "#ffffff"];
      const bursts = [
        { x: 24, y: 26, delay: 0 },
        { x: 72, y: 22, delay: .12 },
        { x: 52, y: 36, delay: .24 },
        { x: 34, y: 46, delay: .36 },
        { x: 82, y: 42, delay: .48 }
      ];

      bursts.forEach((burst, burstIndex) => {
        const firework = document.createElement("div");
        firework.className = "firework";
        firework.style.setProperty("--x", `${burst.x}vw`);
        firework.style.setProperty("--y", `${burst.y}vh`);

        for (let i = 0; i < 18; i += 1) {
          const spark = document.createElement("i");
          spark.style.setProperty("--a", `${i * 20}deg`);
          spark.style.setProperty("--r", `${72 + (i % 4) * 10}px`);
          spark.style.setProperty("--c", palette[(i + burstIndex) % palette.length]);
          spark.style.setProperty("--delay", `${burst.delay}s`);
          firework.appendChild(spark);
        }

        layer.appendChild(firework);
      });

      document.body.appendChild(layer);
      window.setTimeout(() => layer.remove(), 1900);
    }

    function animateLakeFill(to) {
      const lakeBox = lake.getBoundingClientRect();
      const targetMouth = getBottleMouthPoint(to);
      addStream(
        lakeBox.left + lakeBox.width * .5,
        lakeBox.bottom - 18,
        targetMouth.x,
        targetMouth.y,
        { arc: -120, splash: true }
      );
      pulse(to, "receiving");
    }

    function animatePour(from, to) {
      const directionClass = to === "lake"
        ? "tilting-left"
        : from < to ? "tilting-right" : "tilting-left";
      const poursRight = directionClass === "tilting-right";
      const mouth = getBottleMouthPoint(from, poursRight ? "right" : "left");
      pulse(from, directionClass);

      if (to === "lake") {
        const lakeBox = lake.getBoundingClientRect();
        addStream(
          mouth.x,
          mouth.y,
          lakeBox.left + lakeBox.width * .52,
          lakeBox.bottom - 10,
          { arc: -90, splash: true }
        );
        return;
      }

      const toMouth = getBottleMouthPoint(to);
      pulse(to, "receiving");
      addStream(
        mouth.x,
        mouth.y,
        toMouth.x,
        toMouth.y,
        { arc: from < to ? -70 : 70, splash: true }
      );
    }

    function getBottleMouthPoint(index, side = "center") {
      const wrapBox = bucketEls[index].querySelector(".bottle-wrap").getBoundingClientRect();
      const sideFactor = side === "right" ? .74 : side === "left" ? .26 : .5;
      return {
        x: wrapBox.left + wrapBox.width * sideFactor,
        y: wrapBox.top + wrapBox.height * .12
      };
    }

    function pulse(index, className) {
      const el = bucketEls[index];
      el.classList.remove("tilting-left", "tilting-right", "receiving", className);
      void el.offsetWidth;
      el.classList.add(className);
      window.setTimeout(() => {
        el.classList.remove("tilting-left", "tilting-right", "receiving", className);
      }, 1520);
    }

    function addStream(x1, y1, x2, y2, options = {}) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const distance = Math.hypot(dx, dy);
      const bend = options.arc ?? (dx > 0 ? -70 : 70);
      const cx = (x1 + x2) / 2 + bend;
      const cy = Math.min(y1, y2) - Math.max(44, distance * .18);
      const path = `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`;
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.classList.add("pour-svg");
      svg.setAttribute("width", window.innerWidth);
      svg.setAttribute("height", window.innerHeight);
      svg.setAttribute("viewBox", `0 0 ${window.innerWidth} ${window.innerHeight}`);
      svg.innerHTML = `
        <defs>
          <linearGradient id="pourGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="rgba(238, 253, 255, .98)" />
            <stop offset="42%" stop-color="rgba(81, 224, 255, .95)" />
            <stop offset="100%" stop-color="rgba(24, 162, 255, .92)" />
          </linearGradient>
        </defs>
        <path class="pour-path" d="${path}" />
        <path class="pour-path thin" d="${path}" transform="translate(${dx > 0 ? -9 : 9}, 3)" />
      `;
      const mainPath = svg.querySelector(".pour-path");
      document.body.appendChild(svg);
      const pathLength = mainPath.getTotalLength();
      svg.style.setProperty("--path-len", pathLength);

      for (let i = 0; i < 8; i += 1) {
        const drop = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        drop.classList.add("pour-drop");
        drop.setAttribute("r", String(2.4 + (i % 3) * .9));
        drop.style.setProperty("--drop-path", `"${path}"`);
        drop.style.setProperty("--delay", `${.16 + i * .075}s`);
        svg.appendChild(drop);
      }

      if (options.splash) addSplash(x2, y2);
      window.setTimeout(() => svg.remove(), 1560);
    }

    function addSplash(x, y) {
      const splash = document.createElement("div");
      splash.className = "splash";
      splash.style.setProperty("--x", `${x}px`);
      splash.style.setProperty("--y", `${y}px`);
      for (let i = 0; i < 9; i += 1) {
        const drop = document.createElement("span");
        drop.style.setProperty("--a", `${-70 + i * 17}deg`);
        drop.style.setProperty("--d", `${16 + (i % 4) * 7}px`);
        splash.appendChild(drop);
      }
      document.body.appendChild(splash);
      window.setTimeout(() => splash.remove(), 900);
    }

    render();
  </script>
</body>
</html>
