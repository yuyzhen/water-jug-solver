<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>148升倒水挑战</title>
  <style>
    :root {
      --ink: #f8fbff;
      --muted: rgba(248, 251, 255, .72);
      --line: rgba(150, 219, 255, .42);
      --cyan: #3cd7ff;
      --gold: #ffd34f;
      --rose: #ff6d98;
      --water: #21c9ff;
      --deep: #081031;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      overflow-x: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", "Inter", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 8%, rgba(104, 84, 255, .34), transparent 28%),
        radial-gradient(circle at 78% 18%, rgba(28, 211, 255, .22), transparent 26%),
        radial-gradient(ellipse at 50% 92%, rgba(0, 142, 255, .2), transparent 46%),
        linear-gradient(180deg, #060b2d 0%, #08134b 45%, #02081f 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .48;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.56) 0 1px, transparent 2px),
        radial-gradient(circle, rgba(61,215,255,.7) 0 1px, transparent 2px);
      background-size: 104px 116px, 157px 131px;
      background-position: 14px 24px, 58px 71px;
      mask-image: linear-gradient(180deg, #000 0 68%, transparent);
    }

    .game {
      position: relative;
      width: min(100vw, 1180px);
      height: 100vh;
      min-height: 720px;
      margin: 0 auto;
      padding: 26px clamp(18px, 4vw, 52px) 24px;
      display: grid;
      grid-template-rows: auto 132px minmax(390px, 1fr) auto;
      gap: 16px;
    }

    .game::after {
      content: "";
      position: absolute;
      left: clamp(10px, 4vw, 54px);
      right: clamp(10px, 4vw, 54px);
      bottom: 92px;
      height: 190px;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 50% 42%, rgba(45, 208, 255, .22), transparent 58%),
        radial-gradient(ellipse at 50% 82%, rgba(0, 14, 58, .62), transparent 64%);
      pointer-events: none;
      z-index: 0;
      filter: blur(.2px);
    }

    header {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5.4vw, 72px);
      line-height: 1;
      color: #fff7bd;
      text-shadow:
        0 7px 0 rgba(0,0,0,.28),
        0 0 26px rgba(255, 221, 92, .38),
        -6px 0 24px rgba(101, 188, 255, .28);
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: rgba(230, 240, 255, .83);
      font-size: clamp(14px, 1.8vw, 18px);
      line-height: 1.55;
      max-width: 620px;
      text-shadow: 0 0 16px rgba(124, 186, 255, .2);
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .controls button {
      display: inline-flex;
      align-items: center;
      gap: 9px;
    }

    .controls button span {
      display: grid;
      place-items: center;
      width: 22px;
      height: 22px;
      font-size: 21px;
      line-height: 1;
      filter: drop-shadow(0 0 8px rgba(151, 231, 255, .48));
    }

    button {
      appearance: none;
      border: 1px solid rgba(125, 173, 255, .42);
      color: white;
      background:
        linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.05)),
        radial-gradient(circle at 50% 0%, rgba(82, 184, 255, .18), transparent 62%);
      border-radius: 10px;
      padding: 11px 16px;
      font: inherit;
      font-weight: 850;
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.28),
        0 0 0 1px rgba(46, 114, 255, .14),
        0 14px 28px rgba(0,0,0,.24);
      backdrop-filter: blur(14px);
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(151, 231, 255, .72);
      background:
        linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,.07)),
        radial-gradient(circle at 50% 0%, rgba(62, 207, 255, .28), transparent 64%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.35),
        0 0 22px rgba(64, 202, 255, .24),
        0 16px 30px rgba(0,0,0,.28);
    }

    button:active { transform: translateY(1px) scale(.99); }

    button:disabled {
      cursor: default;
      opacity: .46;
      filter: saturate(.7);
    }

    .lake {
      position: relative;
      z-index: 4;
      align-self: stretch;
      border: 1px solid rgba(112, 117, 255, .78);
      border-radius: 18px;
      overflow: visible;
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.2),
        inset 0 -34px 58px rgba(1, 19, 81, .86),
        0 24px 54px rgba(0,0,0,.26),
        0 0 42px rgba(45, 141, 255, .2);
      background:
        radial-gradient(ellipse at 48% 0%, rgba(213, 251, 255, .62), transparent 22%),
        radial-gradient(ellipse at 77% 54%, rgba(46, 188, 255, .26), transparent 23%),
        linear-gradient(180deg, rgba(31, 175, 255, .92), rgba(15, 92, 216, .72) 40%, rgba(4, 21, 92, .96));
    }

    .lake-pixi {
      position: absolute;
      inset: 0;
      z-index: 0;
      border-radius: inherit;
      overflow: hidden;
      pointer-events: none;
    }

    .lake-pixi canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .lake::before,
    .lake::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 30px;
      border-radius: 50%;
      overflow: hidden;
      background:
        repeating-linear-gradient(105deg, transparent 0 74px, rgba(255,255,255,.35) 86px, transparent 118px),
        linear-gradient(90deg, transparent, rgba(255,255,255,.48), transparent),
        rgba(185, 242, 255, .16);
      animation: wave 4.8s ease-in-out infinite;
    }

    .lake::before { top: 32px; }
    .lake::after { top: 48px; opacity: .34; animation-delay: -1.7s; }

    .lake.pixi-ready::before,
    .lake.pixi-ready::after {
      opacity: 0;
    }

    .lake-label {
      position: absolute;
      z-index: 3;
      left: 24px;
      top: 18px;
      bottom: auto;
      color: rgba(255,255,255,.82);
      font-weight: 900;
      padding: 7px 18px;
      border-radius: 999px;
      background: rgba(8, 17, 86, .44);
      border: 1px solid rgba(198, 247, 255, .26);
      text-shadow: 0 2px 12px rgba(0,0,0,.36);
      backdrop-filter: blur(10px);
    }

    .lake-chip {
      position: absolute;
      left: 50%;
      bottom: -23px;
      transform: translateX(-50%);
      z-index: 6;
      min-width: min(360px, 70%);
      padding: 8px 22px;
      border-radius: 0 0 22px 22px;
      text-align: center;
      color: rgba(221, 239, 255, .88);
      font-weight: 850;
      background: linear-gradient(180deg, rgba(3, 13, 60, .84), rgba(5, 24, 93, .72));
      border: 1px solid rgba(79, 218, 255, .45);
      box-shadow: 0 0 22px rgba(40, 192, 255, .22);
      pointer-events: none;
    }

    .bottle-row {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(3, minmax(105px, 1fr));
      align-items: end;
      justify-items: center;
      gap: clamp(24px, 5vw, 74px);
      padding: 8px 0 2px;
    }

    .bucket {
      --level: 0%;
      --fill: #28caff;
      --bucket-scale: 1;
      --bottle-width: 180px;
      --bottle-height: 360px;
      position: relative;
      width: clamp(160px, 25vw, 250px);
      height: clamp(330px, 51vh, 470px);
      border: 0;
      background: transparent;
      padding: 0;
      transform: translateY(0);
      transition: transform .24s ease, filter .24s ease;
      cursor: pointer;
      outline: none;
      box-shadow: none;
    }

    .bucket:hover,
    .bucket:focus,
    .bucket:active {
      background: transparent;
      box-shadow: none;
    }

    .bucket:hover { filter: brightness(1.09); }
    .bucket::after {
      content: "";
      position: absolute;
      left: 18%;
      right: 18%;
      bottom: -13px;
      height: 22px;
      border-radius: 50%;
      background: radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, .48), transparent 67%);
      z-index: -1;
      pointer-events: none;
      transition: transform .24s ease, opacity .24s ease;
    }

    .bucket.selected {
      transform: translateY(-18px);
      filter: none;
    }
    .bucket.selected::after { transform: translateY(22px) scale(.88); opacity: .38; }
    .bucket.tilting-left .bottle-wrap { animation: tiltLeft 1.45s cubic-bezier(.18, .82, .24, 1) forwards; }
    .bucket.tilting-right .bottle-wrap { animation: tiltRight 1.45s cubic-bezier(.18, .82, .24, 1) forwards; }
    .bucket.receiving .liquid-layer { animation: slosh 1.05s ease-in-out; }
    .bucket.receiving .bottle-svg { filter: drop-shadow(0 18px 22px rgba(0,0,0,.34)) drop-shadow(0 0 18px rgba(142, 234, 255, .28)); }

    .bottle-wrap {
      position: absolute;
      left: 50%;
      bottom: 46px;
      width: var(--bottle-width);
      height: var(--bottle-height);
      transform: translateX(-50%);
      transform-origin: 50% 17%;
    }

    .liquid-pixi {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      overflow: visible;
      opacity: .94;
    }

    .liquid-pixi canvas {
      display: block;
      width: 100%;
      height: 100%;
      filter: saturate(1.18) drop-shadow(0 0 14px color-mix(in srgb, var(--fill), #ffffff 46%));
    }

    .bucket-base {
      position: absolute;
      left: 50%;
      bottom: 42px;
      width: min(178px, 78%);
      height: 42px;
      transform: translateX(-50%);
      border-radius: 50% / 28%;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(119, 230, 255, .72), transparent 48%),
        linear-gradient(180deg, rgba(28, 136, 255, .86), rgba(4, 22, 106, .96));
      border: 1px solid rgba(96, 211, 255, .58);
      box-shadow:
        inset 0 8px 18px rgba(255,255,255,.13),
        inset 0 -12px 18px rgba(0,0,0,.28),
        0 12px 34px rgba(0, 91, 255, .28);
      pointer-events: none;
    }

    .bottle-svg {
      width: 100%;
      height: 100%;
      display: block;
      position: relative;
      z-index: 2;
      overflow: visible;
      filter: drop-shadow(0 18px 22px rgba(0,0,0,.34));
      pointer-events: none;
    }

    .pixi-liquid-ready .liquid-layer {
      opacity: 0;
    }

    .liquid-layer {
      transform-origin: 120px 302px;
      filter: saturate(1.12);
    }

    .liquid-wave {
      animation: liquidWave 2.8s ease-in-out infinite;
      transform-origin: 120px 120px;
    }

    .liquid-fill,
    .liquid-surface {
      transition: y .72s cubic-bezier(.19, 1, .22, 1),
        height .72s cubic-bezier(.19, 1, .22, 1),
        cy .72s cubic-bezier(.19, 1, .22, 1),
        rx .72s cubic-bezier(.19, 1, .22, 1);
    }

    .bucket.tilting-left .liquid-fill,
    .bucket.tilting-left .liquid-surface,
    .bucket.tilting-right .liquid-fill,
    .bucket.tilting-right .liquid-surface,
    .bucket.receiving .liquid-fill,
    .bucket.receiving .liquid-surface {
      transition-delay: .24s;
      transition-duration: .86s;
    }

    .bucket.receiving .liquid-wave {
      animation-duration: 1.05s;
    }

    .bucket-info {
      position: absolute;
      left: 0;
      right: 0;
      bottom: -3px;
      display: grid;
      place-items: center;
      gap: 2px;
      pointer-events: none;
      text-shadow: 0 3px 8px rgba(0,0,0,.75);
    }

    .amount {
      font-size: clamp(28px, 3.9vw, 40px);
      font-weight: 950;
      color: #f8fbff;
      line-height: 1;
      text-shadow: 0 5px 0 rgba(0,0,0,.3), 0 0 22px rgba(98, 206, 255, .4);
    }

    .capacity {
      margin-top: 6px;
      color: rgba(235,245,255,.86);
      font-size: 15px;
      font-weight: 800;
    }

    .pour-svg {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      overflow: visible;
    }

    .pour-pixi {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      overflow: hidden;
    }

    .pour-pixi canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .pour-path {
      fill: none;
      stroke: url(#pourGradient);
      stroke-width: 13;
      stroke-linecap: round;
      stroke-dasharray: var(--path-len);
      stroke-dashoffset: var(--path-len);
      filter: drop-shadow(0 0 12px rgba(57, 218, 255, .92));
      animation: streamDraw 1.36s ease-in-out forwards;
    }

    .pour-path.thin {
      stroke-width: 5;
      opacity: .58;
      animation-delay: .08s;
    }

    .pour-drop {
      fill: rgba(196, 246, 255, .95);
      filter: drop-shadow(0 0 8px rgba(57, 218, 255, .75));
      offset-path: path(var(--drop-path));
      offset-distance: 0%;
      animation: dropTravel 1.02s var(--delay) ease-in forwards;
    }

    .splash {
      position: fixed;
      z-index: 11;
      left: var(--x);
      top: var(--y);
      width: 10px;
      height: 10px;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }

    .splash::before {
      content: "";
      position: absolute;
      inset: -13px;
      border: 3px solid rgba(183, 242, 255, .75);
      border-radius: 50%;
      transform: scale(.2);
      animation: splashRing .7s ease-out forwards;
    }

    .splash span {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, white, rgba(112, 231, 255, .92));
      transform: rotate(var(--a)) translateY(0);
      animation: splashDrop .72s ease-out forwards;
    }

    .status {
      --progress: 0%;
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 18px 28px;
      border: 1px solid rgba(89, 128, 255, .48);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(12, 25, 92, .72), rgba(2, 9, 42, .64)),
        radial-gradient(circle at 12% 0%, rgba(73, 213, 255, .14), transparent 38%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 18px 42px rgba(0,0,0,.22);
      backdrop-filter: blur(16px);
      color: rgba(255,255,255,.86);
    }

    .total {
      font-size: clamp(22px, 4vw, 40px);
      font-weight: 950;
      color: var(--gold);
      text-shadow: 0 5px 0 rgba(0,0,0,.26), 0 0 24px rgba(255, 221, 92, .36);
    }

    .message {
      min-height: 24px;
      color: rgba(236, 244, 255, .88);
      font-size: clamp(15px, 1.8vw, 19px);
      font-weight: 800;
    }

    .target-meter {
      margin-top: 9px;
      width: min(520px, 100%);
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(155, 201, 255, .17);
      box-shadow: inset 0 1px 4px rgba(0,0,0,.38);
    }

    .target-meter span {
      display: block;
      width: var(--progress);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #4c6dff, #2adfff 46%, #fff06a 92%);
      box-shadow: 0 0 22px rgba(72, 220, 255, .28), 0 0 22px rgba(255, 211, 79, .22);
      transition: width .72s cubic-bezier(.19, 1, .22, 1);
    }

    .win {
      color: #fff1a8;
      text-shadow: 0 0 18px rgba(255, 211, 79, .55);
    }

    .win-modal {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(3, 8, 31, .42);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
      backdrop-filter: blur(4px);
    }

    .win-modal.open {
      opacity: 1;
      pointer-events: auto;
    }

    .win-panel {
      width: min(420px, 92vw);
      border: 1px solid rgba(255, 238, 157, .46);
      border-radius: 8px;
      padding: 28px 26px 24px;
      text-align: center;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 224, 96, .22), transparent 42%),
        linear-gradient(180deg, rgba(30, 25, 86, .96), rgba(8, 16, 55, .96));
      box-shadow: 0 30px 80px rgba(0,0,0,.42), 0 0 46px rgba(255, 211, 79, .18);
      transform: translateY(12px) scale(.96);
      transition: transform .25s ease;
    }

    .win-modal.open .win-panel {
      transform: translateY(0) scale(1);
    }

    .win-kicker {
      color: #8feaff;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0;
      margin-bottom: 8px;
    }

    .win-panel h2 {
      margin: 0;
      color: #fff3a6;
      font-size: clamp(30px, 5vw, 46px);
      line-height: 1;
      text-shadow: 0 4px 0 rgba(0,0,0,.26), 0 0 24px rgba(255, 211, 79, .35);
    }

    .win-panel p {
      margin: 14px 0 20px;
      color: rgba(255,255,255,.78);
      line-height: 1.6;
    }

    .fireworks {
      position: fixed;
      inset: 0;
      z-index: 24;
      pointer-events: none;
      overflow: hidden;
    }

    .firework {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: 8px;
      height: 8px;
      transform: translate(-50%, -50%);
    }

    .firework i {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 5px;
      height: 14px;
      border-radius: 999px;
      background: var(--c);
      box-shadow: 0 0 12px var(--c);
      transform: translate(-50%, -50%) rotate(var(--a));
      animation: firework .98s cubic-bezier(.08, .76, .22, 1) forwards;
      animation-delay: var(--delay);
    }

    @keyframes wave {
      0%, 100% { transform: translateX(-3%) scaleX(1.06) translateY(0); }
      50% { transform: translateX(4%) scaleX(.98) translateY(5px); }
    }

    @keyframes bob {
      0%, 100% { transform: translateX(-4%); }
      50% { transform: translateX(5%); }
    }

    @keyframes slosh {
      0%, 100% { transform: translateX(0) skewX(0deg); }
      24% { transform: translateX(-7%) skewX(-8deg); }
      52% { transform: translateX(6%) skewX(7deg); }
      78% { transform: translateX(-3%) skewX(-4deg); }
    }

    @keyframes liquidWave {
      0%, 100% { transform: translateX(-6px); opacity: .38; }
      50% { transform: translateX(6px); opacity: .74; }
    }

    @keyframes firework {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--a)) translateY(0) scale(.25);
      }
      14% { opacity: 1; }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--a)) translateY(var(--r)) scale(.95);
      }
    }

    @keyframes pourSloshLeft {
      0%, 100% { transform: translateX(0) skewX(0deg); }
      30%, 72% { transform: translateX(-7px) skewX(-12deg); }
    }

    @keyframes pourSloshRight {
      0%, 100% { transform: translateX(0) skewX(0deg); }
      30%, 72% { transform: translateX(7px) skewX(12deg); }
    }

    @keyframes tiltLeft {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      28%, 72% { transform: translateX(-50%) rotate(-52deg); }
    }

    @keyframes tiltRight {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      28%, 72% { transform: translateX(-50%) rotate(52deg); }
    }

    @keyframes streamDraw {
      0% { stroke-dashoffset: var(--path-len); opacity: 0; }
      16% { opacity: 1; }
      36%, 78% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: calc(var(--path-len) * -1); opacity: 0; }
    }

    @keyframes dropTravel {
      0% { offset-distance: 0%; opacity: 0; transform: scale(.65); }
      18%, 78% { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; transform: scale(1.05); }
    }

    @keyframes splashRing {
      0% { opacity: 0; transform: scale(.2); }
      35% { opacity: .95; }
      100% { opacity: 0; transform: scale(1.45); }
    }

    @keyframes splashDrop {
      0% { opacity: .95; transform: rotate(var(--a)) translateY(0) scale(.7); }
      100% { opacity: 0; transform: rotate(var(--a)) translateY(var(--d)) scale(.35); }
    }

    @media (max-width: 680px) {
      body { overflow-y: auto; }
      .game {
        min-height: 820px;
        height: auto;
        grid-template-rows: auto 128px 430px auto;
        padding: 20px 18px 22px;
      }
      h1 { font-size: 31px; }
      .subtitle {
        font-size: 13px;
        white-space: normal;
      }
      header {
        flex-direction: column;
        align-items: stretch;
        gap: 14px;
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 7px;
      }
      .controls button {
        justify-content: center;
        gap: 5px;
        padding: 9px 7px;
        font-size: 13px;
        min-width: 0;
      }
      .controls button span {
        width: 16px;
        height: 16px;
        font-size: 16px;
      }
      .lake-label {
        left: 26px;
        top: 18px;
      }
      .lake-chip { min-width: 74%; font-size: 13px; }
      .bottle-row {
        display: block;
        height: 430px;
        overflow: hidden;
      }
      .bucket {
        position: absolute;
        width: 112px;
        height: 346px;
      }
      .bucket:nth-child(1) { left: 18px; }
      .bucket:nth-child(2) { left: 136px; }
      .bucket:nth-child(3) { left: 254px; }
      .bottle-wrap {
        bottom: 82px;
      }
      .bucket-base { bottom: 56px; height: 30px; width: 96px; }
      .bucket-info { bottom: 0; }
      .status { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

    </section>
  </main>

  <script src="https://pixijs.download/release/pixi.min.js"></script>
  <script>
    const capacities = [38, 39, 75];
    const colors = ["#0fa84d", "#e6002d", "#7a36ff"];
    const target = 148;
    const state = {
      amounts: [0, 0, 0],
      selected: null,
      steps: 0,
      history: [],
      won: false,
      isAnimating: false,
      animationTimers: []
    };
    const liquidUpdateDelay = 360;
    const pourAnimationDuration = 1560;

    const row = document.getElementById("bottleRow");
    const lake = document.getElementById("lake");
    const lakePixiHost = document.getElementById("lakePixi");
    const lakeHintEl = document.getElementById("lakeHint");
    const totalEl = document.getElementById("total");
    const messageEl = document.getElementById("message");
    const stepsEl = document.getElementById("steps");
    const dumpBtn = document.getElementById("dumpBtn");
    const hintBtn = document.getElementById("hintBtn");
    const winModal = document.getElementById("winModal");
    const winText = document.getElementById("winText");
    const playAgainBtn = document.getElementById("playAgainBtn");
    let lakePixi = null;
    const liquidRenderers = [];
    const solutionHints = [
      "推荐路径 1/9：装满 75L 桶。",
      "推荐路径 2/9：75L 桶倒入 38L 桶，75L 桶剩 37L。",
      "推荐路径 3/9：把 38L 桶倒回湖里。",
      "推荐路径 4/9：75L 桶剩下的 37L 倒入 38L 桶。",
      "推荐路径 5/9：再次装满 75L 桶。",
      "推荐路径 6/9：75L 桶倒入 39L 桶，75L 桶剩 36L。",
      "推荐路径 7/9：把 39L 桶倒回湖里。",
      "推荐路径 8/9：75L 桶剩下的 36L 倒入 39L 桶。",
      "推荐路径 9/9：最后装满 75L 桶，总量为 37 + 36 + 75 = 148L。"
    ];
    let hintIndex = 0;
    let hintUnlocked = false;

    const bucketEls = capacities.map((capacity, index) => {
      const button = document.createElement("button");
      button.className = "bucket";
      button.type = "button";
      button.dataset.index = index;
      button.style.setProperty("--fill", colors[index]);
      setBottleSize(button, capacity);
      button.innerHTML = `
        <div class="bottle-wrap">
          ${bottleSvg(index)}
          <div class="liquid-pixi" data-liquid-index="${index}" aria-hidden="true"></div>
        </div>
        <div class="bucket-base"></div>
        <div class="bucket-info">
          <div class="amount">0L</div>
          <div class="capacity">容量 ${capacity}L</div>
        </div>

      button.addEventListener("click", () => handleBucket(index));
      row.appendChild(button);
      return button;
    });

    window.addEventListener("resize", () => {
      bucketEls.forEach((button, index) => setBottleSize(button, capacities[index]));
    });

    function setBottleSize(button, capacity) {
      const isMobile = window.matchMedia("(max-width: 680px)").matches;
      const scale = Math.sqrt(capacity / Math.max(...capacities));
      const baseWidth = isMobile ? 112 : 224;
      const baseHeight = isMobile ? 224 : 370;

      button.style.setProperty("--bottle-width", `${Math.round(baseWidth * scale)}px`);
      button.style.setProperty("--bottle-height", `${Math.round(baseHeight * scale)}px`);
    }

    function bottleSvg(index) {
      const clipId = `bottleClip${index}`;
      const glassId = `glassGradient${index}`;
      const bodyId = `bodyGradient${index}`;
      const rimId = `rimGradient${index}`;
      const liquidId = `liquidGradient${index}`;
      const shineId = `shineGradient${index}`;
      const glowId = `glassGlow${index}`;
      return `
        <svg class="bottle-svg" viewBox="0 0 240 360" aria-hidden="true">
          <defs>
            <filter id="${glowId}" x="-35%" y="-35%" width="170%" height="170%">
              <feGaussianBlur stdDeviation="2.8" result="blur"/>
              <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.08 0 0 0 0 0.56 0 0 0 0 1 0 0 0 .82 0"/>
              <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>

            </filter>
            <linearGradient id="${glassId}" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#dffcff" stop-opacity=".85"/>
              <stop offset="8%" stop-color="#19baff" stop-opacity=".95"/>
              <stop offset="18%" stop-color="#043cba" stop-opacity=".88"/>
              <stop offset="35%" stop-color="#ffffff" stop-opacity=".18"/>
              <stop offset="56%" stop-color="#07113d" stop-opacity=".28"/>
              <stop offset="76%" stop-color="#ffffff" stop-opacity=".5"/>
              <stop offset="91%" stop-color="#0ba9ff" stop-opacity=".95"/>
              <stop offset="100%" stop-color="#002a93" stop-opacity=".98"/>
            </linearGradient>
            <radialGradient id="${bodyId}" cx="48%" cy="34%" r="76%">
              <stop offset="0%" stop-color="#c9edff" stop-opacity=".18"/>
              <stop offset="44%" stop-color="#164aa8" stop-opacity=".12"/>
              <stop offset="76%" stop-color="#02113e" stop-opacity=".34"/>
              <stop offset="100%" stop-color="#00051d" stop-opacity=".62"/>
            </radialGradient>
            <linearGradient id="${rimId}" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#e9fdff"/>
              <stop offset="28%" stop-color="#6bdfff"/>
              <stop offset="58%" stop-color="#116cc5"/>
              <stop offset="100%" stop-color="#02164e"/>
            </linearGradient>
            <linearGradient id="${liquidId}" x1="0%" y1="0%" x2="100%" y2="100%">

              <stop offset="42%" stop-color="var(--fill)" stop-opacity=".76"/>

              <stop offset="72%" stop-color="white" stop-opacity=".42"/>
              <stop offset="82%" stop-color="white" stop-opacity=".18"/>

            </linearGradient>
            <clipPath id="${clipId}">
              <path d="M55 142 C55 119 74 103 96 99 L100 77 L140 77 L144 99 C166 103 185 119 185 142 L185 278 C185 302 169 315 144 318 L96 318 C71 315 55 302 55 278 Z"/>
            </clipPath>
          </defs>

          <ellipse cx="120" cy="329" rx="82" ry="15" fill="#000824" opacity=".72"/>
          <ellipse cx="120" cy="323" rx="70" ry="11" fill="#21d7ff" opacity=".2"/>

          <path d="M99 51 L99 100 C105 105 135 105 141 100 L141 51 Z" fill="url(#${bodyId})" stroke="url(#${glassId})" stroke-width="5" opacity=".92"/>
          <ellipse cx="120" cy="50" rx="21" ry="5.2" fill="#071846" stroke="#8bf2ff" stroke-width="2.4" opacity=".94"/>
          <ellipse cx="120" cy="48.5" rx="14" ry="2.2" fill="#e9ffff" opacity=".3"/>
          <path d="M86 101 C94 90 101 82 100 72 L140 72 C139 82 146 90 154 101 C174 108 194 124 194 148 L194 278 C194 308 174 323 144 326 L96 326 C66 323 46 308 46 278 L46 148 C46 124 66 108 86 101 Z"
            fill="url(#${bodyId})" stroke="url(#${glassId})" stroke-width="9" stroke-linejoin="round" filter="url(#${glowId})"/>

          <g class="liquid-layer" clip-path="url(#${clipId})">
            <rect class="liquid-fill" x="55" y="302" width="130" height="0" rx="20" fill="url(#${liquidId})"/>
            <ellipse class="liquid-surface" cx="120" cy="306" rx="60" ry="9.5" fill="#e0ffff" opacity=".18"/>
            <path class="liquid-wave" d="M60 306 C82 298 101 314 122 306 C143 298 160 314 184 306" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity=".5"/>
            <path class="liquid-wave" d="M64 317 C91 309 106 324 130 316 C151 309 162 323 180 316" fill="none" stroke="#f4ffff" stroke-width="1.6" stroke-linecap="round" opacity=".28"/>
            <circle cx="89" cy="218" r="3.5" fill="#ffffff" opacity=".16"/>
            <circle cx="152" cy="254" r="4.3" fill="#ffffff" opacity=".2"/>
            <circle cx="142" cy="189" r="2.8" fill="#ffffff" opacity=".12"/>
          </g>

          <path d="M58 142 C58 121 75 108 98 103 L101 83 L139 83 L142 103 C165 108 182 121 182 142 L182 279 C182 300 168 312 143 314 L97 314 C72 312 58 300 58 279 Z"
            fill="none" stroke="#d8fbff" stroke-opacity=".35" stroke-width="3"/>
          <path d="M64 306 C89 320 151 320 176 306" fill="none" stroke="#020d48" stroke-width="14" stroke-linecap="round" opacity=".76"/>
          <path d="M70 301 C96 311 144 311 170 301" fill="none" stroke="#c9fbff" stroke-width="5" stroke-linecap="round" opacity=".48"/>
          <path d="M158 112 C185 138 181 263 160 301" fill="none" stroke="url(#${shineId})" stroke-width="30" stroke-linecap="round" opacity=".92"/>
          <path d="M78 136 C67 179 67 248 78 292" fill="none" stroke="#79efff" stroke-width="5.5" stroke-linecap="round" opacity=".72"/>
          <path d="M184 143 C192 194 190 250 181 292" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".25"/>
          <path d="M70 132 C80 108 99 101 113 99" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity=".14"/>
        </svg>
      `;
    }

    lake.addEventListener("click", fillFromLake);
    lake.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        fillFromLake();
      }
    });

    dumpBtn.addEventListener("click", dumpToLake);
    hintBtn.addEventListener("click", () => {
      if (!hintUnlocked) {
        const password = window.prompt("请输入提示密码");
        if (password !== "148") {
          setMessage("密码不对，暂时不能查看提示。");
          return;
        }
        hintUnlocked = true;
      }
      setMessage(solutionHints[hintIndex]);
      hintIndex = (hintIndex + 1) % solutionHints.length;
    });
    playAgainBtn.addEventListener("click", resetGame);

    document.getElementById("resetBtn").addEventListener("click", resetGame);

    function resetGame() {
      clearAnimationTimers();
      cleanupBottleMotion();
      state.amounts = [0, 0, 0];
      state.selected = null;
      state.steps = 0;
      state.history = [];
      state.won = false;
      state.isAnimating = false;
      hintIndex = 0;
      hideWin();
      setMessage("湖水已经归零，重新开始。");
      render();
    }

    document.getElementById("undoBtn").addEventListener("click", () => {
      if (state.isAnimating) {
        setMessage("等这次倒水结束后再撤销。");
        return;
      }
      const last = state.history.pop();
      if (!last) {
        setMessage("还没有可撤销的倒水步骤。");
        return;
      }
      state.amounts = last.amounts;
      state.selected = last.selected;
      state.steps = last.steps;
      state.won = false;
      hideWin();
      setMessage("已撤销上一步。");
      render();
    });

    function handleBucket(index) {
      if (state.isAnimating) {
        setMessage("水还在流，稍等一下。");
        return;
      }
      if (state.selected === null) {
        state.selected = index;
        setMessage(`${capacities[index]}L 桶已选中。`);
        render();
        return;
      }

      if (state.selected === index) {
        state.selected = null;
        setMessage("取消选中。");
        render();
        return;
      }

      pourToBucket(state.selected, index);
    }

    function dumpToLake() {
      if (state.isAnimating) {
        setMessage("水还在流，稍等一下。");
        return;
      }
      const index = state.selected;
      if (index === null) {
        setMessage("先选中一个要倒回湖里的水桶。");
        return;
      }
      if (state.amounts[index] === 0) {
        setMessage("选中的水桶是空的。");
        return;
      }

      saveHistory();
      const poured = state.amounts[index];
      const nextAmounts = [...state.amounts];
      nextAmounts[index] = 0;
      animatePour(index, "lake");
      setMessage(`${capacities[index]}L 桶倒回湖里 ${poured}L。`);
      scheduleLiquidUpdate(() => {
        state.amounts = nextAmounts;
        state.steps += 1;
      }, null);
    }

    function fillFromLake() {
      if (state.isAnimating) {
        setMessage("水还在流，稍等一下。");
        return;
      }
      const index = state.selected;
      if (index === null) {
        setMessage("先选中一个水桶。");
        return;
      }
      const need = capacities[index] - state.amounts[index];
      if (need === 0) {
        setMessage("这个水桶已经满了。");
        return;
      }
      saveHistory();
      const nextAmounts = [...state.amounts];
      nextAmounts[index] = capacities[index];
      animateLakeFill(index);
      setMessage(`从湖里装满 ${capacities[index]}L 桶，加入 ${need}L。`);
      scheduleLiquidUpdate(() => {
        state.amounts = nextAmounts;
        state.steps += 1;
      }, null);
    }

    function pourToBucket(from, to) {
      const available = state.amounts[from];
      const space = capacities[to] - state.amounts[to];
      if (available === 0) {
        setMessage("选中的水桶是空的。");
        state.selected = to;
        render();
        return;
      }
      if (space === 0) {
        setMessage("目标水桶已经满了。");
        state.selected = to;
        render();
        return;
      }

      saveHistory();
      const moved = Math.min(available, space);
      const nextAmounts = [...state.amounts];
      nextAmounts[from] -= moved;
      nextAmounts[to] += moved;
      animatePour(from, to);
      setMessage(`${capacities[from]}L 桶向 ${capacities[to]}L 桶倒入 ${moved}L。`);
      scheduleLiquidUpdate(() => {
        state.amounts = nextAmounts;
        state.steps += 1;
      }, null);
    }

    function saveHistory() {
      state.history.push({
        amounts: [...state.amounts],
        selected: state.selected,
        steps: state.steps
      });
      if (state.history.length > 80) state.history.shift();
    }

    function renderSoon() {
      render();
      window.setTimeout(checkWin, 1560);
    }

    function scheduleLiquidUpdate(applyUpdate, finalSelected) {
      state.isAnimating = true;
      dumpBtn.disabled = true;
      render();
      const updateTimer = window.setTimeout(() => {
        applyUpdate();
        render();
      }, liquidUpdateDelay);
      const endTimer = window.setTimeout(() => {
        cleanupBottleMotion();
        state.isAnimating = false;
        state.animationTimers = [];
        state.selected = finalSelected;
        render();
        checkWin();
      }, pourAnimationDuration);
      state.animationTimers.push(updateTimer, endTimer);
    }

    function clearAnimationTimers() {
      state.animationTimers.forEach((timer) => window.clearTimeout(timer));
      state.animationTimers = [];
    }

    function cleanupBottleMotion() {
      bucketEls.forEach((el) => {
        el.classList.remove("tilting-left", "tilting-right", "receiving");
      });
    }

    function hexToRgb(hex) {
      const clean = hex.replace("#", "");
      const value = Number.parseInt(clean.length === 3
        ? clean.split("").map((part) => part + part).join("")
        : clean, 16);
      return {
        r: (value >> 16) & 255,
        g: (value >> 8) & 255,
        b: value & 255
      };
    }

    function mixHexColor(hex, targetHex, amount) {
      const source = hexToRgb(hex);
      const targetRgb = hexToRgb(targetHex);
      const mix = (a, b) => Math.round(a + (b - a) * amount);
      return (mix(source.r, targetRgb.r) << 16)
        + (mix(source.g, targetRgb.g) << 8)
        + mix(source.b, targetRgb.b);
    }

    function liquidBoundsAt(y) {
      if (y < 77) return { left: 100, right: 140 };
      if (y < 101) return { left: 99, right: 141 };
      if (y < 142) {
        const t = Math.max(0, Math.min(1, (y - 101) / 41));
        const eased = t * t * (3 - 2 * t);
        return {
          left: 96 + (55 - 96) * eased,
          right: 144 + (185 - 144) * eased
        };
      }
      if (y > 278) {
        const t = Math.max(0, Math.min(1, (y - 278) / 40));
        const eased = t * t * (3 - 2 * t);
        return {
          left: 55 + (96 - 55) * eased,
          right: 185 + (144 - 185) * eased
        };
      }
      return { left: 55, right: 185 };
    }

    async function initBottleLiquids() {
      if (!window.PIXI) return;

      const hosts = bucketEls.map((bucket) => bucket.querySelector(".liquid-pixi"));
      await Promise.all(hosts.map(async (host, index) => {
        if (!host) return;
        const app = new PIXI.Application();
        try {
          await app.init({
            resizeTo: host,
            backgroundAlpha: 0,
            antialias: true,
            autoDensity: true,
            resolution: Math.min(window.devicePixelRatio || 1, 2)
          });
        } catch (error) {
          console.warn("PixiJS bottle liquid renderer failed to initialize.", error);
          return;
        }

        host.appendChild(app.canvas);
        bucketEls[index].classList.add("pixi-liquid-ready");

        const liquidBody = new PIXI.Graphics();
        const depthTint = new PIXI.Graphics();
        const surface = new PIXI.Graphics();
        const caustics = new PIXI.Graphics();
        const bubbleLayer = new PIXI.Graphics();
        const layer = new PIXI.Container();
        layer.addChild(liquidBody, depthTint, caustics, surface, bubbleLayer);
        app.stage.addChild(layer);

        const baseColor = colors[index];
        const brightColor = mixHexColor(baseColor, "#ffffff", .42);
        const darkColor = mixHexColor(baseColor, "#001a48", .34);
        const bubbles = Array.from({ length: 12 }, (_, bubbleIndex) => ({
          x: 68 + Math.random() * 104,
          y: 128 + Math.random() * 174,
          r: 1.4 + Math.random() * 3.5,
          speed: 10 + Math.random() * 18,
          drift: Math.random() * Math.PI * 2,
          delay: bubbleIndex * .41
        }));
        const liquidState = {
          ratio: 0,
          targetRatio: 0,
          amplitude: 0,
          direction: 1,
          time: Math.random() * 10
        };

        function waveY(x, topY, time, amplitude, wobble) {
          return topY
            + Math.sin(x / 17 + time * 2.2) * amplitude
            + Math.sin(x / 34 - time * 1.35) * amplitude * .55
            + wobble;
        }

        function drawLiquid(delta) {
          const width = app.renderer.width;
          const height = app.renderer.height;
          if (width < 2 || height < 2) return;

          layer.scale.set(width / 240, height / 360);
          liquidState.time += delta / 60;
          liquidState.ratio += (liquidState.targetRatio - liquidState.ratio) * .075;
          liquidState.amplitude *= .965;

          const ratio = Math.max(0, Math.min(1, liquidState.ratio));
          const topY = 302 - ratio * 198;
          const bounds = liquidBoundsAt(topY);
          const amplitude = ratio > .01 ? 1.5 + ratio * 3.2 + liquidState.amplitude * 12 : 0;
          const wobble = Math.sin(liquidState.time * 7.6) * liquidState.amplitude * 9 * liquidState.direction;
          const samples = 18;

          liquidBody.clear();
          depthTint.clear();
          surface.clear();
          caustics.clear();
          bubbleLayer.clear();

          if (ratio < .004) return;

          liquidBody.moveTo(bounds.left, waveY(bounds.left, topY, liquidState.time, amplitude, wobble));
          for (let i = 1; i <= samples; i += 1) {
            const p = i / samples;
            const x = bounds.left + (bounds.right - bounds.left) * p;
            liquidBody.lineTo(x, waveY(x, topY, liquidState.time, amplitude, wobble));
          }
          liquidBody.lineTo(185, 278);
          liquidBody.bezierCurveTo(185, 302, 169, 315, 144, 318);
          liquidBody.lineTo(96, 318);
          liquidBody.bezierCurveTo(71, 315, 55, 302, 55, 278);
          liquidBody.lineTo(bounds.left, waveY(bounds.left, topY, liquidState.time, amplitude, wobble));
          liquidBody.closePath();
          liquidBody.fill({ color: mixHexColor(baseColor, "#ffffff", .08), alpha: .98 });
          liquidBody.roundRect(68, Math.max(topY + 12, 118), 104, Math.max(0, 292 - topY), 24)
            .fill({ color: mixHexColor(baseColor, "#ffffff", .16), alpha: .2 });

          depthTint.roundRect(58, Math.max(topY + 18, 112), 124, Math.max(0, 298 - topY), 28)
            .fill({ color: darkColor, alpha: .04 });
          depthTint.ellipse(120, 303, 58, 14).fill({ color: 0x001c54, alpha: .06 });

          const surfaceRx = ratio > .86 ? 40 : 58 - ratio * 8;
          surface.ellipse(120 + wobble * .35, topY + wobble * .08, surfaceRx, 8 + amplitude * .18)
            .fill({ color: 0xdffcff, alpha: .42 });
          surface.ellipse(120 - 10 + wobble * .22, topY - 1.2, surfaceRx * .72, 3.4)
            .fill({ color: 0xffffff, alpha: .24 });
          surface.ellipse(95 + wobble * .2, topY + Math.max(20, (302 - topY) * .28), 18, Math.max(18, (302 - topY) * .28))
            .fill({ color: brightColor, alpha: .16 });

          caustics.moveTo(bounds.left + 8, topY + 14 + wobble * .16);
          for (let i = 1; i <= samples; i += 1) {
            const p = i / samples;
            const x = bounds.left + 8 + (bounds.right - bounds.left - 16) * p;
            const y = topY + 14 + Math.sin(p * Math.PI * 3 + liquidState.time * 2.8) * (2.5 + liquidState.amplitude * 7);
            caustics.lineTo(x, y);
          }
          caustics.stroke({ width: 2.4, color: 0xffffff, alpha: .24, cap: "round", join: "round" });

          bubbles.forEach((bubble) => {
            const travel = ((liquidState.time * bubble.speed + bubble.delay * 35) % 188);
            const y = 306 - travel;
            if (y <= topY + 8 || y > 310) return;
            const boundsAtBubble = liquidBoundsAt(y);
            const x = Math.max(boundsAtBubble.left + 8, Math.min(boundsAtBubble.right - 8,
              bubble.x + Math.sin(liquidState.time * 1.6 + bubble.drift) * 6));
            const alpha = Math.max(0, Math.min(.3, (y - topY) / 80));
            bubbleLayer.circle(x, y, bubble.r).stroke({ width: 1.1, color: 0xcffbff, alpha });
            bubbleLayer.circle(x - bubble.r * .24, y - bubble.r * .28, Math.max(.55, bubble.r * .22))
              .fill({ color: 0xffffff, alpha: alpha * .85 });
          });
        }

        app.ticker.add(drawLiquid);
        liquidRenderers[index] = {
          setLevel(ratio) {
            const nextRatio = Math.max(0, Math.min(1, ratio));
            const delta = nextRatio - liquidState.targetRatio;
            if (Math.abs(delta) > .002) {
              liquidState.direction = delta >= 0 ? -1 : 1;
              liquidState.amplitude = Math.min(.78, liquidState.amplitude + Math.abs(delta) * 1.6 + .12);
            }
            liquidState.targetRatio = nextRatio;
          },
          disturb(direction = 1, strength = .34) {
            liquidState.direction = direction;
            liquidState.amplitude = Math.min(.92, liquidState.amplitude + strength);
          },
          destroy() {
            app.destroy(true);
          }
        };
        liquidRenderers[index].setLevel(state.amounts[index] / capacities[index]);
      }));
    }

    async function initLakePixi() {
      if (!window.PIXI || !lakePixiHost) return;

      const app = new PIXI.Application();
      try {
        await app.init({
          resizeTo: lake,
          backgroundAlpha: 0,
          antialias: true,
          autoDensity: true,
          resolution: Math.min(window.devicePixelRatio || 1, 2)
        });
      } catch (error) {
        console.warn("PixiJS lake renderer failed to initialize.", error);
        return;
      }

      lakePixiHost.appendChild(app.canvas);
      lake.classList.add("pixi-ready");

      const deep = new PIXI.Graphics();
      const glow = new PIXI.Graphics();
      const body = new PIXI.Graphics();
      const surface = new PIXI.Graphics();
      const highlight = new PIXI.Graphics();
      const bubbles = Array.from({ length: 22 }, (_, index) => ({
        x: Math.random(),
        y: Math.random(),
        r: 1.4 + Math.random() * 3.2,
        speed: .045 + Math.random() * .07,
        drift: Math.random() * Math.PI * 2,
        delay: index * .37
      }));
      const bubbleGraphics = new PIXI.Graphics();

      app.stage.addChild(deep, glow, body, surface, highlight, bubbleGraphics);

      const pixiState = {
        app,
        progress: 0,
        targetProgress: 0
      };

      function drawWave(graphics, time, y, amplitude, length, color, alpha, thickness, phase) {
        const width = app.renderer.width;
        const points = [];
        for (let x = -24; x <= width + 24; x += 18) {
          const waveY = y
            + Math.sin((x / length) + time + phase) * amplitude
            + Math.sin((x / (length * .58)) - time * 1.35 + phase) * amplitude * .34;
          points.push([x, waveY]);
        }

        graphics.moveTo(points[0][0], points[0][1]);
        for (let i = 1; i < points.length; i += 1) {
          const prev = points[i - 1];
          const point = points[i];
          graphics.quadraticCurveTo(prev[0], prev[1], (prev[0] + point[0]) / 2, (prev[1] + point[1]) / 2);
        }
        graphics.stroke({ width: thickness, color, alpha, cap: "round", join: "round" });
      }

      function renderLake() {
        const width = app.renderer.width;
        const height = app.renderer.height;
        const time = performance.now() / 1000;
        pixiState.progress += (pixiState.targetProgress - pixiState.progress) * .045;
        const progressWidth = width * pixiState.progress;

        deep.clear();
        deep.rect(0, 0, width, height).fill({ color: 0x021347, alpha: .88 });
        deep.rect(0, 0, width, Math.max(30, height * .42)).fill({ color: 0x158fe8, alpha: .5 });
        deep.ellipse(width * .5, height * .02, width * .56, height * .34).fill({ color: 0xcffbff, alpha: .2 });
        deep.ellipse(width * .72, height * .58, width * .22, height * .18).fill({ color: 0x2ce4ff, alpha: .12 });

        glow.clear();
        if (progressWidth > 2) {
          glow.roundRect(0, 0, progressWidth, height, 18).fill({ color: 0x245fff, alpha: .14 });
          glow.rect(0, height * .58, progressWidth, height * .42).fill({ color: 0x16d7ff, alpha: .09 });
        }

        body.clear();
        body.rect(0, height * .36, width, height * .64).fill({ color: 0x05276f, alpha: .5 });
        body.rect(0, height * .5, width, height * .5).fill({ color: 0x011047, alpha: .46 });

        surface.clear();
        drawWave(surface, time * 1.8, height * .34, 5.5, 96, 0xd7ffff, .88, 3.2, 0);
        drawWave(surface, time * 1.35, height * .42, 6.5, 120, 0x7be8ff, .46, 7, 1.7);
        drawWave(surface, time * .95, height * .51, 4.5, 164, 0xffffff, .22, 12, 3.2);

        highlight.clear();
        const sweepX = ((time * 74) % (width + 240)) - 120;
        highlight.ellipse(sweepX, height * .31, 150, 9).fill({ color: 0xffffff, alpha: .16 });
        highlight.ellipse(width * .5, height * .33, width * .46, 8).fill({ color: 0xffffff, alpha: .13 });

        bubbleGraphics.clear();
        bubbles.forEach((bubble) => {
          const by = ((bubble.y - ((time + bubble.delay) * bubble.speed)) % 1 + 1) % 1;
          const x = bubble.x * width + Math.sin(time * 1.3 + bubble.drift) * 12;
          const y = height * (.82 - by * .58);
          const alpha = .1 + by * .28;
          bubbleGraphics.circle(x, y, bubble.r).stroke({ width: 1, color: 0xb7f4ff, alpha });
          bubbleGraphics.circle(x - bubble.r * .25, y - bubble.r * .28, Math.max(.55, bubble.r * .22)).fill({ color: 0xffffff, alpha: alpha * .7 });
        });
      }

      app.ticker.add(renderLake);
      lakePixi = {
        setProgress(value) {
          pixiState.targetProgress = Math.max(0, Math.min(1, value));
        },
        destroy() {
          app.destroy(true);
        }
      };
    }

    function render() {
      bucketEls.forEach((el, index) => {
        const amount = state.amounts[index];
        const ratio = amount / capacities[index];
        const liquidBottom = 302;
        const liquidHeight = ratio * 198;
        const liquidY = liquidBottom - liquidHeight;
        const surfaceY = amount === 0 ? 306 : liquidY;
        const surfaceRadius = ratio > .82 ? 42 : 58;
        el.style.setProperty("--level", `${ratio * 100}%`);
      el.classList.toggle("selected", state.selected === index);
      if (liquidRenderers[index]) liquidRenderers[index].setLevel(ratio);
      const fill = el.querySelector(".liquid-fill");
      const surface = el.querySelector(".liquid-surface");
        fill.setAttribute("y", liquidY.toFixed(2));
        fill.setAttribute("height", liquidHeight.toFixed(2));
        surface.setAttribute("cy", surfaceY.toFixed(2));
        surface.setAttribute("rx", String(surfaceRadius));
        surface.setAttribute("opacity", amount === 0 ? ".18" : ".78");
        el.querySelector(".amount").textContent = `${amount}L`;
        el.setAttribute("aria-label", `${capacities[index]}升水桶，当前${amount}升`);
      });
      const total = state.amounts.reduce((sum, value) => sum + value, 0);
      totalEl.textContent = `${total} / ${target}L`;
      lakeHintEl.textContent = total === target
        ? `已完成 ${target}L，挑战成功！`
        : `已完成 ${total}L，还差 ${Math.max(target - total, 0)}L 即可成功`;
      totalEl.classList.toggle("win", total === target);
      const progress = Math.min(total / target, 1);
      document.querySelector(".status").style.setProperty("--progress", `${progress * 100}%`);
      if (lakePixi) lakePixi.setProgress(progress);
      stepsEl.textContent = `步数：${state.steps}`;
      dumpBtn.disabled = state.selected === null || state.amounts[state.selected] === 0;
    }

    function setMessage(text) {
      messageEl.textContent = text;
    }

    function checkWin() {
      const total = state.amounts.reduce((sum, value) => sum + value, 0);
      if (total === target && !state.won) {
        state.won = true;
        setMessage(`完成：三个水桶中一共精确留下 ${target}L。`);
        showWin();
      }
    }

    function showWin() {
      winText.textContent = `你用了 ${state.steps} 步完成挑战，三个水桶里的水量合计正好 ${target}L。`;
      winModal.classList.add("open");
      winModal.setAttribute("aria-hidden", "false");
      launchFireworks();
    }

    function hideWin() {
      winModal.classList.remove("open");
      winModal.setAttribute("aria-hidden", "true");
    }

    function launchFireworks() {
      document.querySelectorAll(".fireworks").forEach((node) => node.remove());
      const layer = document.createElement("div");
      layer.className = "fireworks";
      const palette = ["#ffd34f", "#8feaff", "#ff6d98", "#9cff55", "#ffffff"];
      const bursts = [
        { x: 24, y: 26, delay: 0 },
        { x: 72, y: 22, delay: .12 },
        { x: 52, y: 36, delay: .24 },
        { x: 34, y: 46, delay: .36 },
        { x: 82, y: 42, delay: .48 }
      ];

      bursts.forEach((burst, burstIndex) => {
        const firework = document.createElement("div");
        firework.className = "firework";
        firework.style.setProperty("--x", `${burst.x}vw`);
        firework.style.setProperty("--y", `${burst.y}vh`);

        for (let i = 0; i < 18; i += 1) {
          const spark = document.createElement("i");
          spark.style.setProperty("--a", `${i * 20}deg`);
          spark.style.setProperty("--r", `${72 + (i % 4) * 10}px`);
          spark.style.setProperty("--c", palette[(i + burstIndex) % palette.length]);
          spark.style.setProperty("--delay", `${burst.delay}s`);
          firework.appendChild(spark);
        }

        layer.appendChild(firework);
      });

      document.body.appendChild(layer);
      window.setTimeout(() => layer.remove(), 1900);
    }

    function animateLakeFill(to) {
      const lakeBox = lake.getBoundingClientRect();
      const targetMouth = getBottleMouthPoint(to);
      addStream(
        lakeBox.left + lakeBox.width * .5,
        lakeBox.bottom - 18,
        targetMouth.x,
        targetMouth.y,
        { arc: -120, splash: true }
      );
      pulse(to, "receiving");
    }

    function animatePour(from, to) {
      const directionClass = to === "lake"
        ? "tilting-left"
        : from < to ? "tilting-right" : "tilting-left";
      const poursRight = directionClass === "tilting-right";
      const mouth = getBottleMouthPoint(from, poursRight ? "right" : "left");
      pulse(from, directionClass);

      if (to === "lake") {
        const lakeBox = lake.getBoundingClientRect();
        addStream(
          mouth.x,
          mouth.y,
          lakeBox.left + lakeBox.width * .52,
          lakeBox.bottom - 10,
          { arc: -90, splash: true }
        );
        return;
      }

      const toMouth = getBottleMouthPoint(to);
      pulse(to, "receiving");
      addStream(
        mouth.x,
        mouth.y,
        toMouth.x,
        toMouth.y,
        { arc: from < to ? -70 : 70, splash: true }
      );
    }

    function getBottleMouthPoint(index, side = "center") {
      const wrapBox = bucketEls[index].querySelector(".bottle-wrap").getBoundingClientRect();
      const sideFactor = side === "right" ? .74 : side === "left" ? .26 : .5;
      return {
        x: wrapBox.left + wrapBox.width * sideFactor,
        y: wrapBox.top + wrapBox.height * .12
      };
    }

    function pulse(index, className) {
      const el = bucketEls[index];
      el.classList.remove("tilting-left", "tilting-right", "receiving", className);
      void el.offsetWidth;
      el.classList.add(className);
      if (liquidRenderers[index]) {
        const direction = className === "tilting-left" ? -1 : 1;
        const strength = className === "receiving" ? .5 : .74;
        liquidRenderers[index].disturb(direction, strength);
      }
      window.setTimeout(() => {
        el.classList.remove("tilting-left", "tilting-right", "receiving", className);
      }, 1520);
    }

    function addStream(x1, y1, x2, y2, options = {}) {
      if (window.PIXI) {
        addPixiStream(x1, y1, x2, y2, options);
        return;
      }
      addSvgStream(x1, y1, x2, y2, options);
    }

    async function addPixiStream(x1, y1, x2, y2, options = {}) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const distance = Math.hypot(dx, dy);
      const bend = options.arc ?? (dx > 0 ? -70 : 70);
      const cx = (x1 + x2) / 2 + bend;
      const cy = Math.min(y1, y2) - Math.max(44, distance * .18);
      const layer = document.createElement("div");
      layer.className = "pour-pixi";
      document.body.appendChild(layer);

      const app = new PIXI.Application();
      try {
        await app.init({
          width: window.innerWidth,
          height: window.innerHeight,
          backgroundAlpha: 0,
          antialias: true,
          autoDensity: true,
          resolution: Math.min(window.devicePixelRatio || 1, 2)
        });
      } catch (error) {
        layer.remove();
        console.warn("PixiJS pour stream failed to initialize.", error);
        addSvgStream(x1, y1, x2, y2, options);
        return;
      }

      layer.appendChild(app.canvas);
      const stream = new PIXI.Graphics();
      const drops = new PIXI.Graphics();
      const splash = new PIXI.Graphics();
      app.stage.addChild(stream, drops, splash);

      const start = performance.now();
      const duration = 1560;
      const particles = Array.from({ length: 24 }, (_, index) => ({
        delay: 120 + index * 42 + Math.random() * 48,
        duration: 720 + Math.random() * 260,
        size: 2.2 + Math.random() * 3.2,
        lane: (Math.random() - .5) * 12,
        alpha: .46 + Math.random() * .38
      }));
      const splashDrops = Array.from({ length: 18 }, (_, index) => ({
        angle: (-150 + index * 17 + Math.random() * 8) * Math.PI / 180,
        speed: 42 + Math.random() * 52,
        size: 1.7 + Math.random() * 2.7,
        delay: Math.random() * 120
      }));

      const pointAt = (t) => {
        const inv = 1 - t;
        return {
          x: inv * inv * x1 + 2 * inv * t * cx + t * t * x2,
          y: inv * inv * y1 + 2 * inv * t * cy + t * t * y2
        };
      };
      const tangentAt = (t) => {
        const tx = 2 * (1 - t) * (cx - x1) + 2 * t * (x2 - cx);
        const ty = 2 * (1 - t) * (cy - y1) + 2 * t * (y2 - cy);
        const len = Math.hypot(tx, ty) || 1;
        return { x: tx / len, y: ty / len };
      };

      function drawPartialPath(graphics, from, to, width, color, alpha, offset = 0) {
        const steps = 34;
        const first = pointAt(from);
        const firstTan = tangentAt(from);
        graphics.moveTo(first.x - firstTan.y * offset, first.y + firstTan.x * offset);
        for (let i = 1; i <= steps; i += 1) {
          const t = from + (to - from) * (i / steps);
          const point = pointAt(t);
          const tan = tangentAt(t);
          const wave = Math.sin((t * 38) + performance.now() / 90) * 1.7;
          graphics.lineTo(point.x - tan.y * (offset + wave), point.y + tan.x * (offset + wave));
        }
        graphics.stroke({ width, color, alpha, cap: "round", join: "round" });
      }

      function drawPixiPour() {
        const elapsed = performance.now() - start;
        const p = Math.min(elapsed / duration, 1);
        stream.clear();
        drops.clear();
        splash.clear();

        const head = p < .18 ? p / .18 : 1;
        const tail = p > .76 ? (p - .76) / .24 : 0;
        if (head > tail) {
          const streamAlpha = p < .12 ? p / .12 : p > .78 ? (1 - p) / .22 : 1;
          drawPartialPath(stream, tail, head, 14, 0x8feaff, .5 * streamAlpha, 0);
          drawPartialPath(stream, tail, head, 7, 0xeaffff, .78 * streamAlpha, dx > 0 ? -4 : 4);
          drawPartialPath(stream, Math.max(tail, .03), head, 3, 0xffffff, .52 * streamAlpha, dx > 0 ? 5 : -5);
        }

        particles.forEach((particle) => {
          const local = (elapsed - particle.delay) / particle.duration;
          if (local <= 0 || local >= 1) return;
          const eased = local * local * (3 - 2 * local);
          const point = pointAt(eased);
          const tan = tangentAt(eased);
          const drift = Math.sin(local * Math.PI * 3 + particle.delay) * 3;
          const x = point.x - tan.y * (particle.lane + drift);
          const y = point.y + tan.x * (particle.lane + drift) + Math.sin(local * Math.PI) * 4;
          const alpha = Math.sin(local * Math.PI) * particle.alpha;
          drops.circle(x, y, particle.size).fill({ color: 0xdffcff, alpha });
          drops.circle(x - particle.size * .25, y - particle.size * .3, particle.size * .32)
            .fill({ color: 0xffffff, alpha: alpha * .75 });
        });

        if (options.splash) {
          const splashAge = elapsed - duration * .48;
          if (splashAge > 0) {
            const ringT = Math.min(splashAge / 720, 1);
            splash.circle(x2, y2, 9 + ringT * 32)
              .stroke({ width: 2.6 * (1 - ringT), color: 0xdffcff, alpha: .55 * (1 - ringT) });
            splash.ellipse(x2, y2 + 4, 22 + ringT * 44, 5 + ringT * 10)
              .stroke({ width: 2, color: 0x7be8ff, alpha: .3 * (1 - ringT) });

            splashDrops.forEach((drop) => {
              const local = (splashAge - drop.delay) / 540;
              if (local <= 0 || local >= 1) return;
              const alpha = Math.sin(local * Math.PI) * .8;
              const x = x2 + Math.cos(drop.angle) * drop.speed * local;
              const y = y2 + Math.sin(drop.angle) * drop.speed * local + 60 * local * local;
              splash.circle(x, y, drop.size * (1 - local * .28)).fill({ color: 0xcffbff, alpha });
            });
          }
        }

        if (p >= 1) {
          app.ticker.remove(drawPixiPour);
          window.setTimeout(() => {
            app.destroy(true);
            layer.remove();
          }, 60);
        }
      }

      app.ticker.add(drawPixiPour);
    }

    function addSvgStream(x1, y1, x2, y2, options = {}) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const distance = Math.hypot(dx, dy);
      const bend = options.arc ?? (dx > 0 ? -70 : 70);
      const cx = (x1 + x2) / 2 + bend;
      const cy = Math.min(y1, y2) - Math.max(44, distance * .18);
      const path = `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`;
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.classList.add("pour-svg");
      svg.setAttribute("width", window.innerWidth);
      svg.setAttribute("height", window.innerHeight);
      svg.setAttribute("viewBox", `0 0 ${window.innerWidth} ${window.innerHeight}`);
      svg.innerHTML = `
        <defs>
          <linearGradient id="pourGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="rgba(238, 253, 255, .98)" />
            <stop offset="42%" stop-color="rgba(81, 224, 255, .95)" />
            <stop offset="100%" stop-color="rgba(24, 162, 255, .92)" />
          </linearGradient>
        </defs>
        <path class="pour-path" d="${path}" />
        <path class="pour-path thin" d="${path}" transform="translate(${dx > 0 ? -9 : 9}, 3)" />
      `;
      const mainPath = svg.querySelector(".pour-path");
      document.body.appendChild(svg);
      const pathLength = mainPath.getTotalLength();
      svg.style.setProperty("--path-len", pathLength);

      for (let i = 0; i < 8; i += 1) {
        const drop = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        drop.classList.add("pour-drop");
        drop.setAttribute("r", String(2.4 + (i % 3) * .9));
        drop.style.setProperty("--drop-path", `"${path}"`);
        drop.style.setProperty("--delay", `${.16 + i * .075}s`);
        svg.appendChild(drop);
      }

      if (options.splash) addSplash(x2, y2);
      window.setTimeout(() => svg.remove(), 1560);
    }

    function addSplash(x, y) {
      const splash = document.createElement("div");
      splash.className = "splash";
      splash.style.setProperty("--x", `${x}px`);
      splash.style.setProperty("--y", `${y}px`);
      for (let i = 0; i < 9; i += 1) {
        const drop = document.createElement("span");
        drop.style.setProperty("--a", `${-70 + i * 17}deg`);
        drop.style.setProperty("--d", `${16 + (i % 4) * 7}px`);
        splash.appendChild(drop);
      }
      document.body.appendChild(splash);
      window.setTimeout(() => splash.remove(), 900);
    }

    initBottleLiquids();
    initLakePixi();
    render();
  </script>
</body>
</html>
